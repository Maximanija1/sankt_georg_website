services:
  scanbuddy-app:
    build: .
    image: scanbuddy-app:latest
    container_name: scanbuddy-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
    expose:
      - "5003"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

networks:
  web:
    external: true
