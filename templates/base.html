<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanBuddy Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-grain"></div>

    <header class="site-header">
        <nav class="nav-inner">
            <a href="{{ url_for('today') }}" class="site-brand">
                <span class="brand-mark">S</span>
                <span class="brand-text">ScanBuddy</span>
            </a>
            <div class="nav-links">
                <span class="nav-user">Angemeldet als <strong>{{ session.get('user_email', '') }}</strong></span>
                <a href="{{ url_for('today') }}" class="{% if request.endpoint == 'today' %}active{% endif %}">Heute</a>
                <a href="{{ url_for('history') }}" class="{% if request.endpoint == 'history' %}active{% endif %}">Verlauf</a>
                <form method="POST" action="{{ url_for('logout') }}" class="logout-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit" class="logout">Abmelden</button>
                </form>
            </div>
        </nav>
    </header>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
