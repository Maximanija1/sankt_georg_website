<!DOCTYPE html>
<html lang="de">
<head>
    {% include "_head.html" %}
    <title>Anmelden — ScanBuddy</title>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    <div class="page-grain"></div>

    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="brand">
                    <span class="brand-mark">S</span>
                    ScanBuddy
                </div>
                <p class="eyebrow">Dashboard</p>
                <p class="subtitle">Anmelden mit Ihren ScanBuddy-Zugangsdaten</p>
            </div>

            {% for category, message in messages %}
                <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="ihre@email.de">

                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Passwort">

                <button type="submit">Anmelden</button>
            </form>
        </div>
    </div>

    {% endwith %}

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
